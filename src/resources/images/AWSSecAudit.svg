<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <!-- Terminal window background -->
  <rect width="800" height="480" rx="10" ry="10" fill="#1a1a2e"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="10" ry="10" fill="#16213e"/>
  <rect y="18" width="800" height="18" fill="#16213e"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="400" y="23" font-family="monospace" font-size="13" fill="#8892a4" text-anchor="middle" dominant-baseline="middle">aws-sec-audit</text>

  <!-- Header line -->
  <text x="24" y="62" font-family="monospace" font-size="13" fill="#e2e8f0" font-weight="bold">AWS Security Scorecard</text>
  <text x="260" y="62" font-family="monospace" font-size="13" fill="#4a5568">v1.0.0</text>
  <text x="24" y="80" font-family="monospace" font-size="12" fill="#4a5568">Account: 123456789012  |  Region: eu-west-2</text>
  <text x="24" y="96" font-family="monospace" font-size="12" fill="#2d3748">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- IAM section -->
  <text x="24" y="116" font-family="monospace" font-size="13" fill="#90cdf4" font-weight="bold">IAM</text>
  <text x="38" y="133" font-family="monospace" font-size="12" fill="#fc8181">✗</text>
  <text x="54" y="133" font-family="monospace" font-size="12" fill="#fc8181">[CRITICAL]</text>
  <text x="148" y="133" font-family="monospace" font-size="12" fill="#a0aec0">CIS 1.1  — Root account has no MFA enabled</text>
  <text x="38" y="149" font-family="monospace" font-size="12" fill="#f6ad55">✗</text>
  <text x="54" y="149" font-family="monospace" font-size="12" fill="#f6ad55">[HIGH]   </text>
  <text x="148" y="149" font-family="monospace" font-size="12" fill="#a0aec0">CIS 1.4  — Access key older than 90 days</text>
  <text x="38" y="165" font-family="monospace" font-size="12" fill="#68d391">✓</text>
  <text x="54" y="165" font-family="monospace" font-size="12" fill="#68d391">[HIGH]   </text>
  <text x="148" y="165" font-family="monospace" font-size="12" fill="#a0aec0">CIS 1.5  — MFA enabled for all console users</text>

  <!-- S3 section -->
  <text x="24" y="188" font-family="monospace" font-size="13" fill="#90cdf4" font-weight="bold">S3</text>
  <text x="38" y="205" font-family="monospace" font-size="12" fill="#fc8181">✗</text>
  <text x="54" y="205" font-family="monospace" font-size="12" fill="#fc8181">[CRITICAL]</text>
  <text x="148" y="205" font-family="monospace" font-size="12" fill="#a0aec0">CIS 2.1.1 — Bucket my-old-bucket is public</text>
  <text x="38" y="221" font-family="monospace" font-size="12" fill="#68d391">✓</text>
  <text x="54" y="221" font-family="monospace" font-size="12" fill="#68d391">[HIGH]   </text>
  <text x="148" y="221" font-family="monospace" font-size="12" fill="#a0aec0">CIS 2.1.4 — All buckets have SSE enabled</text>

  <!-- VPC section -->
  <text x="24" y="244" font-family="monospace" font-size="13" fill="#90cdf4" font-weight="bold">VPC</text>
  <text x="38" y="261" font-family="monospace" font-size="12" fill="#fc8181">✗</text>
  <text x="54" y="261" font-family="monospace" font-size="12" fill="#fc8181">[CRITICAL]</text>
  <text x="148" y="261" font-family="monospace" font-size="12" fill="#a0aec0">CIS 5.2  — sg-0abc123 allows SSH 0.0.0.0/0</text>
  <text x="38" y="277" font-family="monospace" font-size="12" fill="#68d391">✓</text>
  <text x="54" y="277" font-family="monospace" font-size="12" fill="#68d391">[HIGH]   </text>
  <text x="148" y="277" font-family="monospace" font-size="12" fill="#a0aec0">CIS 5.3  — No unrestricted RDP access</text>

  <!-- Secrets Manager -->
  <text x="24" y="300" font-family="monospace" font-size="13" fill="#90cdf4" font-weight="bold">Secrets Manager</text>
  <text x="38" y="317" font-family="monospace" font-size="12" fill="#f6ad55">✗</text>
  <text x="54" y="317" font-family="monospace" font-size="12" fill="#f6ad55">[HIGH]   </text>
  <text x="148" y="317" font-family="monospace" font-size="12" fill="#a0aec0">SM.1  — /prod/db/password not rotated (127d)</text>

  <!-- Divider -->
  <text x="24" y="340" font-family="monospace" font-size="12" fill="#2d3748">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <!-- Score section background -->
  <rect x="16" y="350" width="768" height="100" rx="8" fill="#0d1117"/>

  <!-- Grade circle -->
  <circle cx="100" cy="400" r="34" fill="none" stroke="#fc8181" stroke-width="3"/>
  <text x="100" y="406" font-family="monospace" font-size="32" fill="#fc8181" font-weight="bold" text-anchor="middle">D</text>

  <!-- Score details -->
  <text x="160" y="375" font-family="monospace" font-size="14" fill="#e2e8f0" font-weight="bold">Score: 58 / 100</text>
  <text x="160" y="395" font-family="monospace" font-size="12" fill="#68d391">● Passed: 9 controls</text>
  <text x="160" y="413" font-family="monospace" font-size="12" fill="#fc8181">● Failed: 9 controls</text>
  <text x="160" y="431" font-family="monospace" font-size="12" fill="#4a5568">Critical: 2  ·  High: 3  ·  Medium: 4  ·  Low: 1</text>

  <!-- Fix hint -->
  <text x="480" y="380" font-family="monospace" font-size="12" fill="#4a5568">Run with --fix --dry-run</text>
  <text x="480" y="397" font-family="monospace" font-size="12" fill="#4a5568">to preview remediations</text>
  <text x="480" y="430" font-family="monospace" font-size="12" fill="#f6ad55">4 controls can be auto-remediated</text>
</svg>
